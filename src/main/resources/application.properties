spring.application.name=anno

# JSP \uC124\uC815 (\uD1B0\uCEA3 \uC11C\uBC84\uC6A9)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Oracle Database \uC124\uC815
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=c##admin001
spring.datasource.password=qwer1234

# MyBatis \uC124\uC815
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.anno.model
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# HikariCP \uC124\uC815 (\uCEE4\uB125\uC158 \uD480)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# \uD2B8\uB79C\uC7AD\uC158 \uC124\uC815
spring.transaction.default-timeout=30
